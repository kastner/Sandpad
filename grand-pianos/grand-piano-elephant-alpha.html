  body {

    position: relative;

    padding: 20px;
    box-shadow: 
      0 20px 60px rgba(0,0,0,0.5),
      inset 0 2px 4px rgba(255,255,255,0.1);
  }

  .piano-body {
    background: linear-gradient(to bottom, #3e2723, #5d4037);
    border-radius: 8px;
    padding: 15px;
    box-shadow: 
      0 8px 25px rgba(0,0,0,0.6),
      inset 0 2px 4px rgba(255,255,255,0.15);
    position: relative;
  }

  .keyboard {
    display: flex;
    position: relative;
    height: 220px;
    user-select: none;
  }

  /* White keys */
  .white-key {
    position: relative;
    width: 50px;
    height: 200px;
    background: linear-gradient(to bottom, #fafafa 0%, #e0e0e0 100%);
    border: 1px solid #cccccc;
    border-radius: 0 0 4px 4px;
    cursor: pointer;
    margin-right: 2px;
    z-index: 1;
    box-shadow: 
      inset 0 1px 2px rgba(0,0,0,0.1),
      0 2px 4px rgba(0,0,0,0.2);
    transition: transform 0.05s ease;
  }

  .white-key:hover {
    background: linear-gradient(to bottom, #ffffff 0%, #f0f0f0 100%);
  }

  .white-key.active {
    transform: translateY(2px);
    background: linear-gradient(to bottom, #e0e0e0 0%, #c8c8c8 100%);
    box-shadow: 
      inset 0 3px 6px rgba(0,0,0,0.2),
      0 1px 2px rgba(0,0,0,0.2);
  }

  /* Black keys */
  .black-key {
    position: absolute;
    width: 34px;
    height: 130px;
    background: linear-gradient(to bottom, #333333 0%, #1a1a1a 100%);
    border-radius: 0 0 3px 3px;
    cursor: pointer;
    margin-left: -17px;
    z-index: 2;
    box-shadow: 
      inset 0 1px 2px rgba(255,255,255,0.1),
      0 2px 4px rgba(0,0,0,0.4);
    transition: transform 0.05s ease;
  }

  .black-key:hover {
    background: linear-gradient(to bottom, #444444 0%, #2a2a2a 100%);
  }

  .black-key.active {
    transform: translateY(2px);
    background: linear-gradient(to bottom, #2a2a2a 0%, #0a0a0a 100%);
    box-shadow: 
      inset 0 2px 4px rgba(0,0,0,0.4),
      0 1px 2px rgba(0,0,0,0.4);
  }

  .black-key:nth-child(10) { left: 112px; }
  .black-key:nth-child(12) { left: 212px; }

  .key-label {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: #666;
    pointer-events: none;
    font-weight: bold;
    letter-spacing: 0.5px;
  }

  'use strict';

  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let ctx;

  function ensureCtx() {
    if (!ctx) {
      ctx = new AudioCtx();
    }
    if (ctx.state === 'suspended') {
      ctx.resume();
    }
    return ctx;
  }

  // Grand piano-like impedance model:
  // Impedance Z(s) = (s^2 + 2*alpha*omega*s + omega^2) / (s^2 + 2*beta*omega*s + omega^2)
  // with different parameters per note for realistic inharmonicity and damping
  function computeFilterParams(freq, noteIndex) {
    const baseOmega = 2 * Math.PI * freq;

    // Inharmonicity grows with note index
    const inharmonicity = 1.0 + noteIndex * 0.00025;
    const omega = baseOmega * inharmonicity;

    // Damping varies smoothly across notes
    const dampingRatio = 0.006 + (noteIndex % 12) * 0.002;

    // Filter bandwidth parameters (related to alpha and beta)
    const alpha = dampingRatio;
    const beta = dampingRatio * 0.7;

    return { omega, alpha, beta };
  }

  function createNoteNode(freq, noteIndex) {
    const ctx = ensureCtx();
    const { omega, alpha, beta } = computeFilterParams(freq, noteIndex);

    // Create the impedance filter (biquad in feedback loop)
    // This mimics the string's complex impedance
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = omega / (2 * Math.PI);
    filter.Q.value = 10 + noteIndex * 0.5; // Q varies across notes

    // Drive with noise burst (simulates hammer strike)
    const noiseGain = ctx.createGain();
    noiseGain.gain.value = 0.008;

    const noise = ctx.createBufferSource();
    const bufSize = ctx.sampleRate * 0.08; // 80ms noise burst
    const buffer = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 2);
    }
    noise.buffer = buffer;

    // Envelope for the noise burst
    const burstEnv = ctx.createGain();
    burstEnv.gain.value = 0;
    burstEnv.gain.setTargetAtTime(1, ctx.currentTime, 0.001);
    burstEnv.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);

    // Main envelope (sustain and release)
    const mainEnv = ctx.createGain();
    mainEnv.gain.value = 0;
    const attackTime = 0.003;
    const releaseTime = 0.8;

    // Low-pass filter to simulate body resonance
    const lpFilter = ctx.createBiquadFilter();
    lpFilter.type = 'lowpass';
    lpFilter.frequency.value = 2500 + freq * 1.5;
    lpFilter.Q.value = 1.5;

    // High-frequency damping filter
    const hfFilter = ctx.createBiquadFilter();
    hfFilter.type = 'lowpass';
    hfFilter.frequency.value = 6000;

    // Connect the network
    noise.connect(burstEnv);
    burstEnv.connect(filter);
    filter.connect(hfFilter);
    hfFilter.connect(mainEnv);
    mainEnv.connect(lpFilter);
    lpFilter.connect(filter); // feedback
    filter.connect(ctx.destination);

    return {
      noteIndex,
      burstEnv,
      mainEnv,
      noise,
      releaseTime
    };
  }

    key.addEventListener('touchend', e => {
      e.preventDefault();
      e.stopPropagation();
      handleKeyUp(e, key);
    }, { passive: false });
  });

  function getNoteFromElement(el) {
    return {
      note: el.dataset.note,
      octave: parseInt(el.dataset.octave, 10),
      freq: parseFloat(el.dataset.freq || getComputedFreq(el.dataset.note, el.dataset.octave)),
    };
  }

  function getComputedFreq(note, octave) {
    const n = notes.find(nn => nn.note === note && nn.octave == octave);
    return n ? n.freq : 440;
  }

  function handleKeyDown(e, el) {
    e.preventDefault();
    const keyInfo = getNoteFromElement(el);
    const existing = activeNotes.get(keyInfo.note + keyInfo.octave);
    if (existing) return;

    const node = createNoteNode(keyInfo.freq, keyInfo.index || notes.findIndex(n => n.note === keyInfo.note && n.octave == keyInfo.octave));
    activeNotes.set(keyInfo.note + keyInfo.octave, node);

    // Animate key press
    el.classList.add('active');

    // Set main envelope
    const now = ctx.currentTime;
    node.mainEnv.gain.setTargetAtTime(0.7, now, 0.001);
    node.mainEnv.gain.exponentialRampToValueAtTime(0.001, now + node.releaseTime + 0.5);

    // Trigger burst
    node.burstEnv.gain.setTargetAtTime(1, now, 0.001);
    node.burstEnv.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
  }

  function handleKeyUp(e, el) {
    e.preventDefault();
    const keyInfo = getNoteFromElement(el);
    const node = activeNotes.get(keyInfo.note + keyInfo.octave);
    if (!node) return;

    // Release envelope
    const now = ctx.currentTime;
    node.mainEnv.gain.setTargetAtTime(node.mainEnv.gain.value, now, 0.001);
    node.mainEnv.gain.exponentialRampToValueAtTime(0.001, now + 1.5);

    // Clean up after release
    setTimeout(() => {
      try {
        node.note.stop();
        node.note.disconnect();
      } catch (e) {}
      activeNotes.delete(keyInfo.note + keyInfo.octave);
    }, 1500);

    // Animate key release
    el.classList.remove('active');
  }

  // Global mouseup to release all notes when mouse leaves piano
  document.addEventListener('mouseup', () => {
    activeNotes.forEach((node, key) => {
      const now = ctx.currentTime;
      node.mainEnv.gain.setTargetAtTime(node.mainEnv.gain.value, now, 0.001);
      node.mainEnv.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
      setTimeout(() => {
        try { node.note.stop(); node.note.disconnect(); } catch (e) {}
      }, 1500);
      // Find corresponding key element and remove active class
      const selector = `.white-key[data-note="${key.split('+')[0]}"][data-octave="${key.split('+')[1]}"]`;
      const el = document.querySelector(selector);
      if (el) el.classList.remove('active');
    });
    activeNotes.clear();
  });

  // Prevent context menu on piano
  document.addEventListener('contextmenu', e => {
    if (e.target.closest('.piano-container')) e.preventDefault();
  });
})();
</script>
</body>
</html>
