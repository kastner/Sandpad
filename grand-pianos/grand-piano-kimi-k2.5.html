<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Piano Synthesizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        h1 {
            color: #f5f5f5;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .controls {
            margin-bottom: 20px;
            color: #ccc;
        }

        .controls button {
            padding: 10px 20px;
            font-size: 16px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .controls button:hover {
            background: #ff6b6b;
        }

        .controls button:disabled {
            background: #666;
            cursor: not-allowed;
        }

        .piano-container {
            background: #333;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .piano {
            position: relative;
            display: flex;
            user-select: none;
        }

        .white-key {
            width: 50px;
            height: 200px;
            background: linear-gradient(180deg, #fff 0%, #e8e8e8 100%);
            border: 1px solid #999;
            border-radius: 0 0 5px 5px;
            cursor: pointer;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 10px;
            font-size: 12px;
            color: #666;
            transition: all 0.05s;
        }

        .white-key:hover {
            background: linear-gradient(180deg, #f0f0f0 0%, #d0d0d0 100%);
        }

        .white-key.active {
            background: linear-gradient(180deg, #ddd 0%, #bbb 100%);
            transform: translateY(2px);
        }

        .black-keys {
            position: absolute;
            top: 0;
            left: 0;
            display: flex;
            pointer-events: none;
        }

        .black-key {
            width: 30px;
            height: 120px;
            background: linear-gradient(180deg, #333 0%, #111 100%);
            border-radius: 0 0 3px 3px;
            cursor: pointer;
            pointer-events: auto;
            margin-left: 35px;
            position: relative;
            transition: all 0.05s;
        }

        .black-key:hover {
            background: linear-gradient(180deg, #444 0%, #222 100%);
        }

        .black-key.active {
            background: linear-gradient(180deg, #555 0%, #333 100%);
            transform: translateY(2px);
        }

        /* Position black keys correctly */
        .black-key:nth-child(1) { margin-left: 35px; }  /* C# */
        .black-key:nth-child(2) { margin-left: 20px; }  /* D# */
        .black-key:nth-child(3) { margin-left: 70px; }  /* F# */
        .black-key:nth-child(4) { margin-left: 20px; }  /* G# */
        .black-key:nth-child(5) { margin-left: 20px; }  /* A# */

        .instructions {
            margin-top: 20px;
            color: #aaa;
            text-align: center;
            font-size: 14px;
        }

        .volume-control {
            margin-top: 15px;
            color: #ccc;
        }

        .volume-control input {
            width: 200px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <h1>🎹 Grand Piano Synthesizer</h1>
    <div class="controls">
        <button id="startBtn">Click to Start Audio</button>
    </div>
    <div class="piano-container">
        <div class="piano" id="piano">
            <!-- White keys will be generated by JavaScript -->
        </div>
    </div>
    <div class="volume-control">
        <label>Volume: <input type="range" id="volume" min="0" max="100" value="70"></label>
    </div>
    <div class="instructions">
        Click keys or use keyboard: A-K for white keys, W-U for black keys<br>
        Sustain pedal effect: hold keys for longer decay
    </div>

    <script>
        // Audio context and master gain
        let audioContext = null;
        let masterGain = null;
        const activeVoices = new Map();

        // Piano key frequencies (C4 to B5)
        const notes = [
            { note: 'C3', freq: 130.81, type: 'white', key: 'z' },
            { note: 'C#3', freq: 138.59, type: 'black', key: 's' },
            { note: 'D3', freq: 146.83, type: 'white', key: 'x' },
            { note: 'D#3', freq: 155.56, type: 'black', key: 'd' },
            { note: 'E3', freq: 164.81, type: 'white', key: 'c' },
            { note: 'F3', freq: 174.61, type: 'white', key: 'v' },
            { note: 'F#3', freq: 185.00, type: 'black', key: 'g' },
            { note: 'G3', freq: 196.00, type: 'white', key: 'b' },
            { note: 'G#3', freq: 207.65, type: 'black', key: 'h' },
            { note: 'A3', freq: 220.00, type: 'white', key: 'n' },
            { note: 'A#3', freq: 233.08, type: 'black', key: 'j' },
            { note: 'B3', freq: 246.94, type: 'white', key: 'm' },
            { note: 'C4', freq: 261.63, type: 'white', key: 'q' },
            { note: 'C#4', freq: 277.18, type: 'black', key: '2' },
            { note: 'D4', freq: 293.66, type: 'white', key: 'w' },
            { note: 'D#4', freq: 311.13, type: 'black', key: '3' },
            { note: 'E4', freq: 329.63, type: 'white', key: 'e' },
            { note: 'F4', freq: 349.23, type: 'white', key: 'r' },
            { note: 'F#4', freq: 369.99, type: 'black', key: '5' },
            { note: 'G4', freq: 392.00, type: 'white', key: 't' },
            { note: 'G#4', freq: 415.30, type: 'black', key: '6' },
            { note: 'A4', freq: 440.00, type: 'white', key: 'y' },
            { note: 'A#4', freq: 466.16, type: 'black', key: '7' },
            { note: 'B4', freq: 493.88, type: 'white', key: 'u' },
            { note: 'C5', freq: 523.25, type: 'white', key: 'i' },
            { note: 'C#5', freq: 554.37, type: 'black', key: '9' },
            { note: 'D5', freq: 587.33, type: 'white', key: 'o' },
            { note: 'D#5', freq: 622.25, type: 'black', key: '0' },
            { note: 'E5', freq: 659.25, type: 'white', key: 'p' },
        ];

        // Initialize audio context
        function initAudio() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioContext.createGain();
            masterGain.connect(audioContext.destination);
            masterGain.gain.value = 0.3;

            document.getElementById('startBtn').style.display = 'none';
        }

        // Create grand piano-like sound using multiple oscillators and envelopes
        function playNote(freq, noteName) {
            if (!audioContext) return;

            const now = audioContext.currentTime;
            const volume = document.getElementById('volume').value / 100;

            // Stop existing note if playing
            stopNote(noteName);

            const voice = {
                oscillators: [],
                gains: [],
                filter: null
            };

            // Create filter for warmth (lowpass with envelope)
            const filter = audioContext.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(3000, now);
            filter.frequency.exponentialRampToValueAtTime(800, now + 2);
            filter.Q.value = 1;
            voice.filter = filter;

            // Harmonic structure for grand piano sound
            // Fundamental + harmonics with decreasing amplitudes
            const harmonics = [
                { ratio: 1, gain: 0.5 },      // Fundamental
                { ratio: 2, gain: 0.25 },     // 2nd harmonic (octave)
                { ratio: 3, gain: 0.15 },     // 3rd harmonic
                { ratio: 4, gain: 0.08 },     // 4th harmonic
                { ratio: 5, gain: 0.05 },     // 5th harmonic
                { ratio: 6, gain: 0.03 },     // 6th harmonic
            ];

            // Adjust harmonics based on frequency (higher notes need less harmonics)
            const adjustedHarmonics = freq > 500 ? harmonics.slice(0, 4) : harmonics;

            adjustedHarmonics.forEach((harm, i) => {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();

                // Use triangle for lower harmonics, sine for higher
                osc.type = i < 2 ? 'triangle' : 'sine';
                osc.frequency.setValueAtTime(freq * harm.ratio, now);

                // ADSR-like envelope
                const attack = 0.005;
                const decay = 0.1;
                const sustain = harm.gain * volume * 0.3;
                const release = freq < 200 ? 3.0 : freq < 500 ? 2.0 : 1.0;

                // Initial attack
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(harm.gain * volume, now + attack);
                gain.gain.exponentialRampToValueAtTime(sustain, now + attack + decay);

                // Store release parameters for note off
                gain.releaseTime = release;
                gain.sustainLevel = sustain;

                osc.connect(gain);
                gain.connect(filter);
                filter.connect(masterGain);

                osc.start(now);

                voice.oscillators.push(osc);
                voice.gains.push(gain);
            });

            // Add subtle noise for hammer strike
            const bufferSize = audioContext.sampleRate * 0.1;
            const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioContext.sampleRate * 0.01));
            }
            const noise = audioContext.createBufferSource();
            noise.buffer = buffer;
            const noiseGain = audioContext.createGain();
            noiseGain.gain.setValueAtTime(0.02 * volume, now);
            noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
            noise.connect(noiseGain);
            noiseGain.connect(filter);
            noise.start(now);
            voice.oscillators.push(noise);
            voice.gains.push(noiseGain);

            activeVoices.set(noteName, voice);
        }

        function stopNote(noteName) {
            const voice = activeVoices.get(noteName);
            if (!voice || !audioContext) return;

            const now = audioContext.currentTime;

            voice.gains.forEach(gain => {
                if (gain.releaseTime) {
                    // Release phase
                    gain.gain.cancelScheduledValues(now);
                    gain.gain.setValueAtTime(gain.gain.value, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + gain.releaseTime);
                } else {
                    gain.gain.setValueAtTime(gain.gain.value, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                }
            });

            voice.oscillators.forEach(osc => {
                try {
                    osc.stop(now + 4);
                } catch (e) {}
            });

            activeVoices.delete(noteName);
        }

        // Build piano UI
        function buildPiano() {
            const piano = document.getElementById('piano');
            const whiteKeysContainer = document.createElement('div');
            whiteKeysContainer.style.display = 'flex';
            
            const blackKeysContainer = document.createElement('div');
            blackKeysContainer.className = 'black-keys';

            notes.forEach(n => {
                if (n.type === 'white') {
                    const key = document.createElement('div');
                    key.className = 'white-key';
                    key.dataset.note = n.note;
                    key.dataset.freq = n.freq;
                    key.textContent = n.note;
                    key.title = `Key: ${n.key.toUpperCase()}`;
                    
                    key.addEventListener('mousedown', () => startPlaying(key));
                    key.addEventListener('mouseup', () => stopPlaying(key));
                    key.addEventListener('mouseleave', () => stopPlaying(key));
                    
                    whiteKeysContainer.appendChild(key);
                } else {
                    const key = document.createElement('div');
                    key.className = 'black-key';
                    key.dataset.note = n.note;
                    key.dataset.freq = n.freq;
                    key.title = `Key: ${n.key.toUpperCase()}`;
                    
                    key.addEventListener('mousedown', () => startPlaying(key));
                    key.addEventListener('mouseup', () => stopPlaying(key));
                    key.addEventListener('mouseleave', () => stopPlaying(key));
                    
                    blackKeysContainer.appendChild(key);
                }
            });

            piano.appendChild(whiteKeysContainer);
            piano.appendChild(blackKeysContainer);
        }

        function startPlaying(key) {
            if (key.classList.contains('active')) return;
            key.classList.add('active');
            const freq = parseFloat(key.dataset.freq);
            const note = key.dataset.note;
            playNote(freq, note);
        }

        function stopPlaying(key) {
            key.classList.remove('active');
            const note = key.dataset.note;
            stopNote(note);
        }

        // Keyboard controls
        const keyMap = {};
        notes.forEach(n => {
            keyMap[n.key] = n;
        });

        document.addEventListener('keydown', (e) => {
            if (e.repeat) return;
            const k = e.key.toLowerCase();
            if (keyMap[k]) {
                const noteData = keyMap[k];
                const selector = `[data-note="${noteData.note}"]`;
                const key = document.querySelector(selector);
                if (key) startPlaying(key);
            }
        });

        document.addEventListener('keyup', (e) => {
            const k = e.key.toLowerCase();
            if (keyMap[k]) {
                const noteData = keyMap[k];
                const selector = `[data-note="${noteData.note}"]`;
                const key = document.querySelector(selector);
                if (key) stopPlaying(key);
            }
        });

        // Volume control
        document.getElementById('volume').addEventListener('input', (e) => {
            if (masterGain) {
                masterGain.gain.value = e.target.value / 300; // Scale appropriately
            }
        });

        // Start button
        document.getElementById('startBtn').addEventListener('click', initAudio);

        // Initialize
        buildPiano();
    </script>
</body>
</html>
