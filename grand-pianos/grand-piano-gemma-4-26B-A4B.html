<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthesized Grand Piano</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #222;
            font-family: sans-serif;
            color: white;
        }

        .piano-container {
            position: relative;
            display: flex;
            padding: 20px;
            background: #111;
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .key {
            cursor: pointer;
            user-select: none;
        }

        .white-key {
            width: 60px;
            height: 250px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 0 0 5px 5px;
            z-index: 1;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 10px;
            color: #888;
            font-size: 12px;
        }

        .white-key:active, .white-key.active {
            background: #e0e0e0;
            height: 245px;
        }

        .black-key {
            width: 40px;
            height: 150px;
            background: #000;
            margin-left: -20px;
            margin-right: -20px;
            z-index: 2;
            border-radius: 0 0 3px 3px;
        }

        .black-key:active, .black-key.active {
            background: #333;
        }

        .controls {
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="controls">
        <h1>JS Grand Piano</h1>
        <p>Click the keys or use your keyboard (A-K range)</p>
    </div>

    <div class="piano-container" id="piano">
        <!-- Keys will be generated by JavaScript -->
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const pianoContainer = document.getElementById('piano');

        // Musical notes setup
        const notes = [
            { note: 'C4', freq: 261.63, type: 'white', key: 'a' },
            { note: 'C#4', freq: 277.18, type: 'black', key: 'w' },
            { note: 'D4', freq: 293.66, type: 'white', key: 's' },
            { note: 'D#4', freq: 311.13, type: 'black', key: 'e' },
            { note: 'E4', freq: 329.63, type: 'white', key: 'd' },
            { note: 'F4', freq: 349.23, type: 'white', key: 'f' },
            { note: 'F#4', freq: 369.99, type: 'black', key: 't' },
            { note: 'G4', freq: 392.00, type: 'white', key: 'g' },
            { note: 'G#4', freq: 415.30, type: 'black', key: 'y' },
            { note: 'A4', freq: 440.00, type: 'white', key: 'h' },
            { note: 'A#4', freq: 466.16, type: 'black', key: 'u' },
            { note: 'B4', freq: 493.88, type: 'white', key: 'j' },
            { note: 'C5', freq: 523.25, type: 'white', key: 'k' }
        ];

        // Synthesizer Engine: Additive Synthesis for Piano-like timbre
        function playNote(frequency) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const now = audioCtx.currentTime;
            const masterGain = audioCtx.createGain();
            
            // Envelope: Fast attack, long exponential decay
            masterGain.gain.setValueAtTime(0, now);
            masterGain.gain.linearRampToValueAtTime(0.4, now + 0.01);
            masterGain.gain.exponentialRampToValueAtTime(0.0001, now + 2);

            masterGain.connect(audioCtx.destination);

            // Piano strings are complex. We simulate this by layering harmonics.
            // Fundamental
            createOscillator(frequency, 1, 0.5, masterGain, now);
            // 2nd Harmonic (Octave)
            createOscillator(frequency * 2, 0.3, 0.2, masterGain, now);
            // 3rd Harmonic (Perfect 5th)
            createOscillator(frequency * 3, 0.1, 0.1, masterGain, now);
            // Higher harmonics for "brightness"
            createOscillator(frequency * 4, 0.05, 0.05, masterGain, now);
        }

        function createOscillator(freq, volume, decayMult, masterGain, startTime) {
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            // Use triangle waves for a softer, more string-like sound than sine
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, startTime);

            gainNode.gain.setValueAtTime(volume, startTime);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, startTime + (2 * decayMult));

            osc.connect(gainNode);
            gainNode.connect(masterGain);

            osc.start(startTime);
            osc.stop(startTime + 2.5);
        }

        // Create Piano UI
        notes.forEach(n => {
            const keyDiv = document.createElement('div');
            keyDiv.className = `key ${n.type}-key`;
            keyDiv.dataset.note = n.note;
            keyDiv.innerHTML = n.type === 'white' ? n.note : '';
            
            keyDiv.addEventListener('mousedown', () => {
                playNote(n.freq);
            });

            pianoContainer.appendChild(keyDiv);
            n.element = keyDiv;
        });

        // Keyboard Support
        window.addEventListener('keydown', (e) => {
            const noteObj = notes.find(n => n.key === e.key.toLowerCase());
            if (noteObj && !e.repeat) {
                playNote(noteObj.freq);
                noteObj.element.classList.add('active');
            }
        });

        window.addEventListener('keyup', (e) => {
            const noteObj = notes.find(n => n.key === e.key.toLowerCase());
            if (noteObj) {
                noteObj.element.classList.remove('active');
            }
        });
    </script>
</body>
</html>
