<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whistle Reader</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0c0c0f;
    --surface: #16161b;
    --surface2: #1e1e25;
    --border: #2a2a35;
    --text: #e8e8ed;
    --text-dim: #6e6e7a;
    --accent: #5b8def;
    --accent-glow: #5b8def33;
    --green: #4ade80;
    --amber: #fbbf24;
    --red: #f87171;
    --degree-1: #5b8def;
    --degree-2: #8b5cf6;
    --degree-3: #ec4899;
    --degree-4: #f97316;
    --degree-5: #4ade80;
    --degree-6: #fbbf24;
    --degree-7: #f87171;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .app {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  header {
    margin-bottom: 48px;
  }

  header h1 {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 28px;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }

  header p {
    color: var(--text-dim);
    font-size: 15px;
    line-height: 1.5;
  }

  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    align-items: center;
    flex-wrap: wrap;
  }

  button {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  button:hover {
    background: var(--surface2);
    border-color: var(--accent);
  }

  button.recording {
    background: #f8717122;
    border-color: var(--red);
    color: var(--red);
    animation: pulse-border 1.5s ease-in-out infinite;
  }

  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 0 0 transparent; }
    50% { box-shadow: 0 0 0 4px #f8717122; }
  }

  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  button.primary:hover {
    background: #4a7ddf;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--red);
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    50% { opacity: 0.3; }
  }

  .key-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
    padding: 10px 16px;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--border);
    margin-left: auto;
  }

  .key-display span {
    color: var(--accent);
    font-weight: 600;
  }

  /* Pitch contour canvas */
  .contour-section {
    margin-bottom: 32px;
  }

  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
  }

  .contour-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  #contourCanvas {
    width: 100%;
    height: 200px;
    display: block;
  }

  /* Scale degree readout */
  .degree-section {
    margin-bottom: 32px;
  }

  .current-degree {
    display: flex;
    align-items: center;
    gap: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 16px;
    min-height: 100px;
  }

  .degree-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 64px;
    font-weight: 700;
    line-height: 1;
    min-width: 80px;
    text-align: center;
    transition: color 0.1s;
  }

  .degree-info {
    flex: 1;
  }

  .degree-name {
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .degree-freq {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
  }

  .degree-cents {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    margin-top: 4px;
  }

  .cents-sharp { color: var(--amber); }
  .cents-flat { color: var(--accent); }
  .cents-good { color: var(--green); }

  /* Note sequence */
  .sequence-section {
    margin-bottom: 32px;
  }

  .note-sequence {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    min-height: 70px;
    align-items: center;
    align-content: flex-start;
  }

  .note-chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    animation: chip-in 0.15s ease-out;
  }

  @keyframes chip-in {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .note-chip.rest {
    color: var(--text-dim);
    font-size: 11px;
    width: 20px;
    background: transparent;
    border: 1px dashed var(--border);
  }

  /* Chromagram */
  .chroma-section {
    margin-bottom: 32px;
  }

  .chroma-grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }

  .chroma-bar {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .chroma-fill {
    width: 100%;
    height: 60px;
    border-radius: 4px;
    background: var(--surface2);
    position: relative;
    overflow: hidden;
  }

  .chroma-fill-inner {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--accent);
    border-radius: 4px;
    transition: height 0.2s;
    opacity: 0.7;
  }

  .chroma-fill.in-scale .chroma-fill-inner {
    opacity: 1;
  }

  .chroma-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    font-weight: 500;
  }

  .chroma-label.in-scale {
    color: var(--accent);
    font-weight: 700;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .app { padding: 24px 16px; }
    header h1 { font-size: 22px; }
    .degree-number { font-size: 48px; min-width: 60px; }
    .controls { gap: 8px; }
    .key-display { margin-left: 0; width: 100%; text-align: center; }
    .chroma-grid { grid-template-columns: repeat(6, 1fr); }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>whistle → scale degree</h1>
    <p>Whistle a melody. The app detects pitches, infers the key, and shows you scale degrees in real time.</p>
  </header>

  <div class="controls">
    <button id="startBtn" class="primary" onclick="toggleRecording()">
      start listening
    </button>
    <button onclick="clearAll()">clear</button>
    <div class="key-display" id="keyDisplay">key: <span>—</span></div>
  </div>

  <div class="contour-section">
    <div class="section-label">pitch contour</div>
    <div class="contour-wrap">
      <canvas id="contourCanvas"></canvas>
    </div>
  </div>

  <div class="degree-section">
    <div class="section-label">current</div>
    <div class="current-degree">
      <div class="degree-number" id="degreeNumber">—</div>
      <div class="degree-info">
        <div class="degree-name" id="degreeName">waiting...</div>
        <div class="degree-freq" id="degreeFreq"></div>
        <div class="degree-cents" id="degreeCents"></div>
      </div>
    </div>
  </div>

  <div class="sequence-section">
    <div class="section-label">sequence</div>
    <div class="note-sequence" id="noteSequence"></div>
  </div>

  <div class="chroma-section">
    <div class="section-label">pitch class histogram</div>
    <div class="chroma-grid" id="chromaGrid"></div>
  </div>
</div>

<script>
// ── State ──
let audioCtx, analyser, mediaStream, animFrame;
let isRecording = false;
let buffer, bufferSize = 2048;

const NOTE_NAMES = ['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'];
const DEGREE_NAMES = ['tonic','supertonic','mediant','subdominant','dominant','submediant','leading tone'];
const DEGREE_SOLFEGE = ['do','re','mi','fa','sol','la','ti'];

// Krumhansl-Kessler major & minor profiles
const MAJOR_PROFILE = [6.35,2.23,3.48,2.33,4.38,4.09,2.52,5.19,2.39,3.66,2.29,2.88];
const MINOR_PROFILE = [6.33,2.68,3.52,5.38,2.60,3.53,2.54,4.75,3.98,2.69,3.34,3.17];

// Accumulated chroma energy
let chromaHist = new Float32Array(12);
let detectedKey = null;      // {root: 0-11, mode: 'major'|'minor', confidence: 0-1}
let noteSequence = [];        // [{degree, time}]
let contourData = [];         // [{time, midi, degree}]
let lastDegree = null;
let lastNoteTime = 0;
let silenceStart = 0;
let inSilence = false;
let startTime = 0;

// ── Pitch detection: autocorrelation (YIN-lite) ──
function detectPitch(buf, sampleRate) {
  const SIZE = buf.length;
  const MAX_LAG = Math.floor(sampleRate / 80);   // min 80 Hz
  const MIN_LAG = Math.floor(sampleRate / 2500);  // max 2500 Hz

  // Check RMS energy
  let rms = 0;
  for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
  rms = Math.sqrt(rms / SIZE);
  if (rms < 0.008) return -1; // silence threshold

  // Difference function
  const diff = new Float32Array(MAX_LAG);
  for (let lag = MIN_LAG; lag < MAX_LAG; lag++) {
    let sum = 0;
    for (let i = 0; i < SIZE - MAX_LAG; i++) {
      const d = buf[i] - buf[i + lag];
      sum += d * d;
    }
    diff[lag] = sum;
  }

  // Cumulative mean normalized difference (YIN step 3)
  const cmnd = new Float32Array(MAX_LAG);
  cmnd[MIN_LAG] = 1;
  let runningSum = diff[MIN_LAG];
  for (let lag = MIN_LAG + 1; lag < MAX_LAG; lag++) {
    runningSum += diff[lag];
    cmnd[lag] = diff[lag] * (lag - MIN_LAG + 1) / runningSum;
  }

  // Absolute threshold (YIN step 4)
  const threshold = 0.15;
  let bestLag = -1;
  for (let lag = MIN_LAG; lag < MAX_LAG - 1; lag++) {
    if (cmnd[lag] < threshold) {
      // Find local min
      while (lag + 1 < MAX_LAG && cmnd[lag + 1] < cmnd[lag]) lag++;
      bestLag = lag;
      break;
    }
  }

  if (bestLag === -1) {
    // Fallback: pick global minimum
    let minVal = Infinity;
    for (let lag = MIN_LAG; lag < MAX_LAG; lag++) {
      if (cmnd[lag] < minVal) { minVal = cmnd[lag]; bestLag = lag; }
    }
    if (minVal > 0.4) return -1; // too uncertain
  }

  // Parabolic interpolation
  if (bestLag > 0 && bestLag < MAX_LAG - 1) {
    const a = cmnd[bestLag - 1];
    const b = cmnd[bestLag];
    const c = cmnd[bestLag + 1];
    const shift = 0.5 * (a - c) / (a - 2 * b + c);
    bestLag = bestLag + shift;
  }

  return sampleRate / bestLag;
}

function freqToMidi(freq) {
  return 69 + 12 * Math.log2(freq / 440);
}

function midiToFreq(midi) {
  return 440 * Math.pow(2, (midi - 69) / 12);
}

// ── Key detection via Krumhansl-Schmuckler ──
function detectKeyFromChroma(chroma) {
  let bestCorr = -Infinity;
  let bestRoot = 0;
  let bestMode = 'major';

  const total = chroma.reduce((a, b) => a + b, 0);
  if (total < 0.01) return null;

  // Normalize
  const norm = chroma.map(v => v / total);

  for (let root = 0; root < 12; root++) {
    for (const [profile, mode] of [[MAJOR_PROFILE, 'major'], [MINOR_PROFILE, 'minor']]) {
      // Rotate profile
      let sumXY = 0, sumX = 0, sumY = 0, sumX2 = 0, sumY2 = 0;
      for (let i = 0; i < 12; i++) {
        const x = norm[(i + root) % 12];
        const y = profile[i];
        sumXY += x * y;
        sumX += x;
        sumY += y;
        sumX2 += x * x;
        sumY2 += y * y;
      }
      const n = 12;
      const corr = (n * sumXY - sumX * sumY) /
        Math.sqrt((n * sumX2 - sumX * sumX) * (n * sumY2 - sumY * sumY));

      if (corr > bestCorr) {
        bestCorr = corr;
        bestRoot = root;
        bestMode = mode;
      }
    }
  }

  return { root: bestRoot, mode: bestMode, confidence: bestCorr };
}

function getScaleDegree(midiNote, key) {
  const pc = ((Math.round(midiNote) % 12) + 12) % 12;
  const scale = key.mode === 'major'
    ? [0, 2, 4, 5, 7, 9, 11]
    : [0, 2, 3, 5, 7, 8, 10];

  let bestDegree = 0;
  let bestDist = Infinity;
  for (let d = 0; d < scale.length; d++) {
    const scalePc = (key.root + scale[d]) % 12;
    let dist = Math.abs(pc - scalePc);
    if (dist > 6) dist = 12 - dist;
    if (dist < bestDist) {
      bestDist = dist;
      bestDegree = d;
    }
  }

  // Cents deviation from the ideal scale pitch
  const idealPc = (key.root + scale[bestDegree]) % 12;
  const actualPc = ((midiNote % 12) + 12) % 12;
  let centsDev = (actualPc - idealPc) * 100;
  if (centsDev > 600) centsDev -= 1200;
  if (centsDev < -600) centsDev += 1200;

  return { degree: bestDegree + 1, cents: centsDev, noteName: NOTE_NAMES[idealPc] };
}

// ── UI Updates ──
const degreeColors = [
  'var(--degree-1)','var(--degree-2)','var(--degree-3)','var(--degree-4)',
  'var(--degree-5)','var(--degree-6)','var(--degree-7)'
];

function updateCurrentDegree(freq, midi, degreeInfo) {
  const numEl = document.getElementById('degreeNumber');
  const nameEl = document.getElementById('degreeName');
  const freqEl = document.getElementById('degreeFreq');
  const centsEl = document.getElementById('degreeCents');

  if (!degreeInfo) {
    numEl.textContent = '—';
    numEl.style.color = 'var(--text-dim)';
    nameEl.textContent = 'waiting...';
    freqEl.textContent = '';
    centsEl.textContent = '';
    return;
  }

  const d = degreeInfo.degree;
  numEl.textContent = d + '̂';
  numEl.style.color = degreeColors[d - 1];
  nameEl.textContent = `${degreeInfo.noteName} — ${DEGREE_SOLFEGE[d - 1]} (${DEGREE_NAMES[d - 1]})`;
  freqEl.textContent = `${freq.toFixed(1)} Hz  ·  MIDI ${midi.toFixed(1)}`;

  const c = Math.round(degreeInfo.cents);
  if (Math.abs(c) < 8) {
    centsEl.textContent = '● in tune';
    centsEl.className = 'degree-cents cents-good';
  } else if (c > 0) {
    centsEl.textContent = `▲ ${c} cents sharp`;
    centsEl.className = 'degree-cents cents-sharp';
  } else {
    centsEl.textContent = `▼ ${Math.abs(c)} cents flat`;
    centsEl.className = 'degree-cents cents-flat';
  }
}

function addToSequence(degree) {
  const now = performance.now();
  // Deduplicate: don't add same degree if it just happened
  if (degree === lastDegree && now - lastNoteTime < 250) {
    lastNoteTime = now;
    return;
  }

  // If silence gap was long enough, add a rest marker
  if (inSilence && lastDegree !== null && now - silenceStart > 350) {
    noteSequence.push({ degree: 0, time: now }); // rest
  }

  if (degree !== lastDegree || now - lastNoteTime > 250) {
    noteSequence.push({ degree, time: now });
    lastDegree = degree;
    lastNoteTime = now;
    inSilence = false;
    renderSequence();
  }
}

function renderSequence() {
  const el = document.getElementById('noteSequence');
  // Show last 60 notes
  const recent = noteSequence.slice(-60);
  el.innerHTML = recent.map(n => {
    if (n.degree === 0) {
      return `<div class="note-chip rest">·</div>`;
    }
    const color = degreeColors[n.degree - 1];
    return `<div class="note-chip" style="color:${color};border-color:${color}33">${n.degree}̂</div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function updateKeyDisplay() {
  const el = document.getElementById('keyDisplay');
  if (!detectedKey || detectedKey.confidence < 0.3) {
    el.innerHTML = 'key: <span>detecting...</span>';
    return;
  }
  const name = NOTE_NAMES[detectedKey.root];
  const mode = detectedKey.mode;
  const conf = Math.round(detectedKey.confidence * 100);
  el.innerHTML = `key: <span>${name} ${mode}</span> (${conf}%)`;
}

function updateChromaGrid() {
  const el = document.getElementById('chromaGrid');
  const max = Math.max(...chromaHist, 0.001);

  const scaleNotes = new Set();
  if (detectedKey) {
    const scale = detectedKey.mode === 'major'
      ? [0,2,4,5,7,9,11]
      : [0,2,3,5,7,8,10];
    scale.forEach(s => scaleNotes.add((detectedKey.root + s) % 12));
  }

  el.innerHTML = '';
  for (let i = 0; i < 12; i++) {
    const pct = (chromaHist[i] / max) * 100;
    const inScale = scaleNotes.has(i);
    el.innerHTML += `
      <div class="chroma-bar">
        <div class="chroma-fill ${inScale ? 'in-scale' : ''}">
          <div class="chroma-fill-inner" style="height:${pct}%;${inScale ? 'background:var(--accent)' : 'background:var(--text-dim);opacity:0.3'}"></div>
        </div>
        <div class="chroma-label ${inScale ? 'in-scale' : ''}">${NOTE_NAMES[i]}</div>
      </div>`;
  }
}

// ── Contour drawing ──
function drawContour() {
  const canvas = document.getElementById('contourCanvas');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;

  ctx.clearRect(0, 0, W, H);

  if (contourData.length < 2) return;

  // Show last 8 seconds
  const now = performance.now();
  const windowMs = 8000;
  const recent = contourData.filter(d => now - d.time < windowMs);
  if (recent.length < 2) return;

  // Find MIDI range
  const midis = recent.map(d => d.midi).filter(m => m > 0);
  if (midis.length === 0) return;

  let minMidi = Math.min(...midis) - 2;
  let maxMidi = Math.max(...midis) + 2;
  if (maxMidi - minMidi < 8) {
    const center = (maxMidi + minMidi) / 2;
    minMidi = center - 4;
    maxMidi = center + 4;
  }

  // Draw scale degree reference lines if we have a key
  if (detectedKey) {
    const scale = detectedKey.mode === 'major'
      ? [0,2,4,5,7,9,11]
      : [0,2,3,5,7,8,10];

    ctx.textAlign = 'right';
    ctx.font = '10px JetBrains Mono';

    for (let octave = 2; octave <= 8; octave++) {
      for (let d = 0; d < scale.length; d++) {
        const midi = (octave * 12) + detectedKey.root + scale[d];
        if (midi < minMidi || midi > maxMidi) continue;
        const y = H - ((midi - minMidi) / (maxMidi - minMidi)) * H;

        ctx.strokeStyle = '#ffffff08';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(30, y);
        ctx.lineTo(W, y);
        ctx.stroke();

        ctx.fillStyle = degreeColors[d] + '88';
        ctx.fillText(`${d + 1}̂`, 26, y + 3);
      }
    }
  }

  // Draw pitch contour
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';

  let prevX = null, prevY = null;
  for (let i = 0; i < recent.length; i++) {
    const d = recent[i];
    if (d.midi <= 0) { prevX = null; continue; }

    const x = ((d.time - (now - windowMs)) / windowMs) * W;
    const y = H - ((d.midi - minMidi) / (maxMidi - minMidi)) * H;

    if (prevX !== null) {
      const color = d.degree ? degreeColors[d.degree - 1] : 'var(--text-dim)';
      ctx.strokeStyle = color;
      ctx.beginPath();
      ctx.moveTo(prevX, prevY);
      ctx.lineTo(x, y);
      ctx.stroke();
    }

    // Dot
    if (d.degree) {
      ctx.fillStyle = degreeColors[d.degree - 1];
      ctx.beginPath();
      ctx.arc(x, y, 2, 0, Math.PI * 2);
      ctx.fill();
    }

    prevX = x;
    prevY = y;
  }
}

// ── Main loop ──
function processAudio() {
  if (!isRecording) return;

  analyser.getFloatTimeDomainData(buffer);
  const freq = detectPitch(buffer, audioCtx.sampleRate);
  const now = performance.now();

  if (freq > 0) {
    const midi = freqToMidi(freq);
    const pc = ((Math.round(midi) % 12) + 12) % 12;

    // Update chroma histogram
    chromaHist[pc] += 1;

    // Re-detect key periodically
    detectedKey = detectKeyFromChroma(chromaHist);
    updateKeyDisplay();

    let degreeInfo = null;
    if (detectedKey && detectedKey.confidence > 0.3) {
      degreeInfo = getScaleDegree(midi, detectedKey);
      addToSequence(degreeInfo.degree);
      contourData.push({ time: now, midi, degree: degreeInfo.degree });
    } else {
      contourData.push({ time: now, midi, degree: null });
    }

    updateCurrentDegree(freq, midi, degreeInfo);
    inSilence = false;
  } else {
    // Silence
    if (!inSilence) {
      inSilence = true;
      silenceStart = now;
    }
    contourData.push({ time: now, midi: 0, degree: null });
    updateCurrentDegree(0, 0, null);
  }

  // Trim old contour data
  if (contourData.length > 2000) {
    contourData = contourData.slice(-1500);
  }

  updateChromaGrid();
  drawContour();

  animFrame = requestAnimationFrame(processAudio);
}

// ── Controls ──
async function toggleRecording() {
  if (isRecording) {
    stopRecording();
    return;
  }

  try {
    audioCtx = new AudioContext();
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: false,
        noiseSuppression: false,
        autoGainControl: false
      }
    });

    const source = audioCtx.createMediaStreamSource(mediaStream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = bufferSize;
    buffer = new Float32Array(bufferSize);
    source.connect(analyser);

    isRecording = true;
    startTime = performance.now();
    const btn = document.getElementById('startBtn');
    btn.classList.add('recording');
    btn.innerHTML = '<span class="dot"></span> stop listening';

    processAudio();
  } catch (e) {
    console.error('Mic error:', e);
    alert('Could not access microphone. Please allow microphone access and try again.');
  }
}

function stopRecording() {
  isRecording = false;
  if (animFrame) cancelAnimationFrame(animFrame);
  if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
  if (audioCtx) audioCtx.close();

  const btn = document.getElementById('startBtn');
  btn.classList.remove('recording');
  btn.innerHTML = 'start listening';
}

function clearAll() {
  chromaHist = new Float32Array(12);
  detectedKey = null;
  noteSequence = [];
  contourData = [];
  lastDegree = null;
  lastNoteTime = 0;

  updateKeyDisplay();
  updateCurrentDegree(0, 0, null);
  document.getElementById('noteSequence').innerHTML = '';
  updateChromaGrid();

  const canvas = document.getElementById('contourCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// Init chroma grid
updateChromaGrid();

// Handle resize for canvas
window.addEventListener('resize', () => {
  if (contourData.length > 0) drawContour();
});
</script>
