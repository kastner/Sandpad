<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whistle Reader</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0c0c0f; --surface: #16161b; --surface2: #1e1e25;
    --border: #2a2a35; --text: #e8e8ed; --text-dim: #6e6e7a;
    --accent: #5b8def; --green: #4ade80; --amber: #fbbf24; --red: #f87171;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  .app { max-width: 900px; margin: 0 auto; padding: 40px 24px; }
  header { margin-bottom: 40px; }
  header h1 { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 28px; letter-spacing: -0.5px; margin-bottom: 8px; }
  header p { color: var(--text-dim); font-size: 15px; line-height: 1.5; }
  .controls { display: flex; gap: 12px; margin-bottom: 24px; align-items: center; flex-wrap: wrap; }
  button { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; padding: 10px 20px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 8px; }
  button:hover { background: var(--surface2); border-color: var(--accent); }
  button:disabled { opacity: 0.4; cursor: default; }
  button.recording { background: #f8717122; border-color: var(--red); color: var(--red); animation: pulse-border 1.5s ease-in-out infinite; }
  @keyframes pulse-border { 0%,100% { box-shadow: 0 0 0 0 transparent; } 50% { box-shadow: 0 0 0 4px #f8717122; } }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.primary:hover { background: #4a7ddf; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0.3; } }

  .mode-display {
    font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--text-dim);
    padding: 10px 16px; background: var(--surface); border-radius: 8px; border: 1px solid var(--border); margin-left: auto;
  }
  .mode-display .mode-name { color: var(--accent); font-weight: 600; font-size: 16px; }
  .mode-display .low-conf { color: var(--amber); }
  .mode-display .tonic-note { color: var(--text-dim); font-size: 12px; }

  .section-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; }
  .contour-section { margin-bottom: 28px; }
  .contour-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; overflow: hidden; }
  #contourCanvas { width: 100%; height: 220px; display: block; }

  .degree-section { margin-bottom: 28px; }
  .current-degree { display: flex; align-items: center; gap: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; min-height: 100px; }
  .degree-number { font-family: 'JetBrains Mono', monospace; font-size: 64px; font-weight: 700; line-height: 1; min-width: 80px; text-align: center; }
  .degree-info { flex: 1; }
  .degree-name { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .degree-freq { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-dim); }
  .degree-cents { font-family: 'JetBrains Mono', monospace; font-size: 12px; margin-top: 4px; }
  .cents-sharp { color: var(--amber); } .cents-flat { color: var(--accent); } .cents-good { color: var(--green); }

  .sequence-section { margin-bottom: 28px; }
  .note-sequence { display: flex; flex-wrap: wrap; gap: 6px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; min-height: 70px; align-items: center; align-content: flex-start; }
  .note-chip { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: var(--surface2); border: 1px solid var(--border); transition: color 0.3s, border-color 0.3s; }
  .note-chip.new { animation: chip-in 0.15s ease-out; }
  @keyframes chip-in { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .note-chip.rest { color: var(--text-dim); font-size: 11px; width: 20px; background: transparent; border: 1px dashed var(--border); }

  .chroma-section { margin-bottom: 28px; }
  .chroma-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .chroma-bar { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .chroma-fill { width: 100%; height: 60px; border-radius: 4px; background: var(--surface2); position: relative; overflow: hidden; }
  .chroma-fill-inner { position: absolute; bottom: 0; left: 0; right: 0; border-radius: 4px; transition: height 0.2s; }
  .chroma-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); font-weight: 500; }
  .chroma-label.in-scale { color: var(--accent); font-weight: 700; }

  .hint { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dim); text-align: center; padding: 12px; background: var(--surface); border: 1px dashed var(--border); border-radius: 8px; margin-bottom: 24px; display: none; }
  .hint.visible { display: block; }
  @media (max-width: 600px) {
    .app { padding: 24px 16px; } header h1 { font-size: 22px; }
    .degree-number { font-size: 48px; min-width: 60px; }
    .controls { gap: 8px; } .mode-display { margin-left: 0; width: 100%; text-align: center; }
    .chroma-grid { grid-template-columns: repeat(6, 1fr); }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>whistle → scale degree</h1>
    <p>Whistle a tonal melody. The app finds your tonic, detects the mode, and shows scale degrees in real time.</p>
  </header>
  <div class="controls">
    <button id="startBtn" class="primary" onclick="toggleRecording()">start listening</button>
    <button onclick="clearAll()">clear</button>
    <button id="downloadBtn" onclick="downloadAudio()" disabled>download wav</button>
    <div class="mode-display" id="modeDisplay"><span class="mode-name">—</span></div>
  </div>
  <div class="hint" id="hint"></div>
  <div class="contour-section">
    <div class="section-label">pitch contour</div>
    <div class="contour-wrap"><canvas id="contourCanvas"></canvas></div>
  </div>
  <div class="degree-section">
    <div class="section-label">current</div>
    <div class="current-degree">
      <div class="degree-number" id="degreeNumber" style="color:var(--text-dim)">—</div>
      <div class="degree-info">
        <div class="degree-name" id="degreeName">waiting...</div>
        <div class="degree-freq" id="degreeFreq"></div>
        <div class="degree-cents" id="degreeCents"></div>
      </div>
    </div>
  </div>
  <div class="sequence-section">
    <div class="section-label">sequence</div>
    <div class="note-sequence" id="noteSequence"></div>
  </div>
  <div class="chroma-section">
    <div class="section-label">detected pitch centers</div>
    <div class="chroma-grid" id="chromaGrid"></div>
  </div>
</div>
<script>
const NOTE_NAMES=['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','B'];
const COLORS=['#5b8def','#8b5cf6','#ec4899','#f97316','#4ade80','#fbbf24','#f87171'];

// Scale/mode templates: intervals from tonic
const SCALES = {
  'major':           { intervals: [0,2,4,5,7,9,11], solfege: ['do','re','mi','fa','sol','la','ti'], names: ['tonic','supertonic','mediant','subdominant','dominant','submediant','leading tone'] },
  'natural minor':   { intervals: [0,2,3,5,7,8,10], solfege: ['do','re','me','fa','sol','le','te'], names: ['tonic','supertonic','mediant','subdominant','dominant','submediant','subtonic'] },
  'dorian':          { intervals: [0,2,3,5,7,9,10], solfege: ['do','re','me','fa','sol','la','te'], names: ['tonic','supertonic','mediant','subdominant','dominant','submediant','subtonic'] },
  'mixolydian':      { intervals: [0,2,4,5,7,9,10], solfege: ['do','re','mi','fa','sol','la','te'], names: ['tonic','supertonic','mediant','subdominant','dominant','submediant','subtonic'] },
  'major pentatonic': { intervals: [0,2,4,7,9], solfege: ['do','re','mi','sol','la'], names: ['tonic','supertonic','mediant','dominant','submediant'] },
  'minor pentatonic': { intervals: [0,3,5,7,10], solfege: ['do','me','fa','sol','te'], names: ['tonic','mediant','subdominant','dominant','subtonic'] },
};

let audioCtx,analyser,mediaStream,animFrame,isRecording=false;
let buffer,bufferSize=2048;
let mediaRecorder=null,audioChunks=[],recordedBlob=null;

// Note stabilization
const SMOOTH_ALPHA=0.25,MIN_NOTE_DURATION_MS=90,PITCH_CHANGE_THRESHOLD=0.8;
const SILENCE_GAP_MS=200,MAX_PITCH_JUMP=7; // tighter: 7 semitones max jump
const MIN_RMS=0.012; // higher threshold to filter breaths

let currentNoteMidi=null,currentNoteStart=0;
let pendingMidi=null,pendingStart=0,lastRawMidi=null;
let lastRms=0; // track RMS for filtering

let noteObservations=[];
let pitchClusters=[];
let detectedKey=null; // {tonicMidi, mode, confidence, intervals}

let noteSequence=[],contourData=[];
let lastSequenceDegree=null,lastSequenceMidi=null;
let inSilence=false,silenceStart=0;
let startTime=0,displayMinMidi=60,displayMaxMidi=80,keyUpdateCounter=0;

// YIN with RMS output
function detectPitch(buf,sr){
  const S=buf.length,MX=Math.floor(sr/80),MN=Math.floor(sr/2500);
  let rms=0;for(let i=0;i<S;i++)rms+=buf[i]*buf[i];rms=Math.sqrt(rms/S);
  lastRms=rms;
  if(rms<MIN_RMS)return-1;
  const d=new Float32Array(MX);
  for(let l=MN;l<MX;l++){let s=0;for(let i=0;i<S-MX;i++){const v=buf[i]-buf[i+l];s+=v*v;}d[l]=s;}
  const c=new Float32Array(MX);c[MN]=1;let rs=d[MN];
  for(let l=MN+1;l<MX;l++){rs+=d[l];c[l]=d[l]*(l-MN+1)/rs;}
  let b=-1;for(let l=MN;l<MX-1;l++){if(c[l]<0.12){while(l+1<MX&&c[l+1]<c[l])l++;b=l;break;}} // tighter threshold
  if(b===-1){let mv=Infinity;for(let l=MN;l<MX;l++)if(c[l]<mv){mv=c[l];b=l;}if(mv>0.35)return-1;}
  if(b>0&&b<MX-1){const a=c[b-1],bb=c[b],cc=c[b+1],dn=a-2*bb+cc;if(Math.abs(dn)>1e-10)b+=0.5*(a-cc)/dn;}
  return sr/b;
}

function freqToMidi(f){return 69+12*Math.log2(f/440);}
function midiToFreq(m){return 440*Math.pow(2,(m-69)/12);}

// Gap-based clustering
function clusterPitches(){
  if(noteObservations.length<3)return[];
  const pts=noteObservations.map(o=>({midi:o.midi,weight:o.isOnset?3:1}));
  pts.sort((a,b)=>a.midi-b.midi);
  const gaps=[];
  for(let i=0;i<pts.length-1;i++)gaps.push({index:i,gap:pts[i+1].midi-pts[i].midi});
  const gv=gaps.map(g=>g.gap).filter(g=>g>0);
  if(gv.length===0)return[mkC(pts)];
  gv.sort((a,b)=>a-b);
  const med=gv[Math.floor(gv.length/2)];
  const minSplit=Math.max(0.5,med*2.5);
  const sg=[...gaps].sort((a,b)=>b.gap-a.gap);
  const splits=[];
  for(const g of sg)if(g.gap>=minSplit&&g.gap>=0.5)splits.push(g.index);
  splits.sort((a,b)=>a-b);
  const cls=[];let start=0;
  for(const si of splits.slice(0,10)){const sl=pts.slice(start,si+1);if(sl.length>0)cls.push(mkC(sl));start=si+1;}
  const last=pts.slice(start);if(last.length>0)cls.push(mkC(last));
  return cls.filter(c=>c.count>=2);
}

function mkC(pts){
  const tw=pts.reduce((s,p)=>s+p.weight,0);
  const center=pts.reduce((s,p)=>s+p.midi*p.weight,0)/tw;
  return{center,count:pts.length,totalWeight:tw};
}

// Mode detection from clusters
function detectMode(clusters){
  if(clusters.length<2)return null;

  // Sort clusters by center
  const sorted=[...clusters].sort((a,b)=>a.center-b.center);

  let bestScore=-Infinity,bestResult=null;

  // Try each cluster as the tonic
  for(let ti=0;ti<sorted.length;ti++){
    const tonicMidi=sorted[ti].center;

    // Compute intervals from this tonic to all other clusters (mod 12)
    const intervals=[];
    for(const c of sorted){
      let interval=c.center-tonicMidi;
      while(interval<0)interval+=12;
      while(interval>=12)interval-=12;
      intervals.push({interval,weight:c.totalWeight,center:c.center});
    }

    // Score against each scale template
    for(const[modeName,scale]of Object.entries(SCALES)){
      let score=0;
      let matchCount=0;

      for(const{interval,weight}of intervals){
        // Find closest scale tone
        let bestDist=Infinity;
        for(const si of scale.intervals){
          const dist=Math.abs(interval-si);
          const distWrap=Math.min(dist,12-dist);
          if(distWrap<bestDist)bestDist=distWrap;
        }
        if(bestDist<0.75){
          score+=(1-bestDist)*weight;
          matchCount++;
        }else{
          score-=bestDist*weight*0.5;
        }
      }

      // Bonus: reward if most clusters fit the scale
      if(matchCount===sorted.length)score+=5;

      // Tonic heuristics
      if(noteObservations.length>0){
        const firstMidi=noteObservations[0].midi;
        const lastMidi=noteObservations[noteObservations.length-1].midi;
        // Last note near tonic
        let lastDist=Math.abs(lastMidi-tonicMidi);
        while(lastDist>6)lastDist=12-lastDist;
        if(lastDist<1)score+=5;
        // First note near tonic or 3rd or 5th
        for(const deg of[0,2,4].filter(d=>d<scale.intervals.length)){
          let fd=Math.abs(firstMidi-tonicMidi-scale.intervals[deg]);
          while(fd>6)fd=12-fd;
          if(fd<1)score+=2;
        }
      }

      // Pentatonic bonus: if only 5 clusters and they all fit pentatonic, prefer it
      if(scale.intervals.length===5&&sorted.length<=5&&matchCount===sorted.length)score+=3;

      // Slight preference for simpler scales when evidence is ambiguous
      if(modeName==='major'||modeName==='natural minor')score+=0.5;

      if(score>bestScore){
        bestScore=score;
        bestResult={tonicMidi,mode:modeName,confidence:score,scaleIntervals:scale.intervals,solfege:scale.solfege,names:scale.names};
      }
    }
  }

  if(!bestResult)return null;
  const maxP=sorted.reduce((s,c)=>s+c.totalWeight,0)+12;
  bestResult.confidence=Math.min(1,Math.max(0,bestResult.confidence/maxP));
  return bestResult;
}

// Scale degree
function getScaleDegree(midi,key){
  const si=key.scaleIntervals;
  let bestD=0,bestDist=Infinity;
  for(let d=0;d<si.length;d++){
    for(let oct=-2;oct<=2;oct++){
      const t=key.tonicMidi+si[d]+oct*12;
      const dist=Math.abs(midi-t);
      if(dist<bestDist){bestDist=dist;bestD=d;}
    }
  }
  let ci=key.tonicMidi+si[bestD];
  while(ci<midi-6)ci+=12;while(ci>midi+6)ci-=12;
  const cents=(midi-ci)*100;
  const iPC=Math.round(key.tonicMidi+si[bestD])%12;
  return{degree:bestD+1,cents,noteName:NOTE_NAMES[(iPC%12+12)%12],solfege:key.solfege[bestD],degreeName:key.names[bestD],dist:bestDist};
}

// Note stabilization
function processNoteStability(midi,now){
  if(lastRawMidi!==null&&Math.abs(midi-lastRawMidi)>MAX_PITCH_JUMP)return null;
  lastRawMidi=midi;
  if(currentNoteMidi===null){currentNoteMidi=midi;currentNoteStart=now;pendingMidi=null;return null;}
  const dist=Math.abs(midi-currentNoteMidi);
  if(dist<PITCH_CHANGE_THRESHOLD){currentNoteMidi+=(midi-currentNoteMidi)*SMOOTH_ALPHA*0.3;pendingMidi=null;return{midi:currentNoteMidi,isNew:false};}
  if(pendingMidi===null||Math.abs(midi-pendingMidi)>PITCH_CHANGE_THRESHOLD){pendingMidi=midi;pendingStart=now;return{midi:currentNoteMidi,isNew:false};}
  pendingMidi+=(midi-pendingMidi)*SMOOTH_ALPHA;
  if(now-pendingStart>=MIN_NOTE_DURATION_MS){currentNoteMidi=pendingMidi;currentNoteStart=now;pendingMidi=null;return{midi:currentNoteMidi,isNew:true};}
  return{midi:currentNoteMidi,isNew:false};
}

function reassignDegrees(){
  if(!detectedKey)return;let ch=false;
  for(const n of noteSequence){if(n.degree===0)continue;const i=getScaleDegree(n.midi,detectedKey);if(i.degree!==n.degree){n.degree=i.degree;ch=true;}}
  for(const c of contourData){if(c.midi>0)c.degree=getScaleDegree(c.midi,detectedKey).degree;}
  if(ch)renderSequence(false);
}

// UI
function updateCurrentDegree(freq,midi,info){
  const n=document.getElementById('degreeNumber'),nm=document.getElementById('degreeName'),fr=document.getElementById('degreeFreq'),ce=document.getElementById('degreeCents');
  if(!info){n.textContent='—';n.style.color='var(--text-dim)';nm.textContent='waiting...';fr.textContent='';ce.textContent='';return;}
  const d=info.degree;const ci=((d-1)%7);
  n.textContent=d+'\u0302';n.style.color=COLORS[ci%7];
  nm.textContent=`${info.solfege} — ${info.degreeName}`;
  fr.textContent=`${freq.toFixed(1)} Hz  ·  MIDI ${midi.toFixed(1)}`;
  const c=Math.round(info.cents);
  if(Math.abs(c)<10){ce.textContent='● in tune';ce.className='degree-cents cents-good';}
  else if(c>0){ce.textContent=`▲ ${c}¢ sharp`;ce.className='degree-cents cents-sharp';}
  else{ce.textContent=`▼ ${Math.abs(c)}¢ flat`;ce.className='degree-cents cents-flat';}
}

function addToSequence(midi,degree,now){
  if(inSilence&&noteSequence.length>0&&now-silenceStart>SILENCE_GAP_MS)noteSequence.push({midi:0,degree:0,time:now});
  if(degree!==lastSequenceDegree||Math.abs(midi-(lastSequenceMidi||0))>1.5){
    noteSequence.push({midi,degree,time:now});lastSequenceDegree=degree;lastSequenceMidi=midi;inSilence=false;renderSequence(true);
  }
}

function renderSequence(animNew){
  const el=document.getElementById('noteSequence');const r=noteSequence.slice(-80);
  el.innerHTML=r.map((n,i)=>{
    if(n.degree===0)return`<div class="note-chip rest">·</div>`;
    const ci=(n.degree-1)%7;const c=COLORS[ci];const last=animNew&&i===r.length-1;
    return`<div class="note-chip ${last?'new':''}" style="color:${c};border-color:${c}33">${n.degree}\u0302</div>`;
  }).join('');
}

function updateHint(){
  const el=document.getElementById('hint');
  if(!isRecording){el.classList.remove('visible');return;}
  const nc=pitchClusters.length;
  if(noteObservations.length===0){el.textContent='♪ start whistling...';el.classList.add('visible');}
  else if(nc<3){el.textContent=`${nc} distinct pitch${nc!==1?'es':''} — keep whistling`;el.classList.add('visible');}
  else if(detectedKey&&detectedKey.confidence<0.4){el.textContent=`mode settling... (${Math.round(detectedKey.confidence*100)}%)`;el.classList.add('visible');}
  else{el.classList.remove('visible');}
}

function updateModeDisplay(){
  const el=document.getElementById('modeDisplay');
  if(!detectedKey){el.innerHTML='<span class="mode-name">—</span>';return;}
  const conf=Math.round(detectedKey.confidence*100);
  const unc=detectedKey.confidence<0.4||pitchClusters.length<3;
  const tPC=NOTE_NAMES[((Math.round(detectedKey.tonicMidi)%12)+12)%12];
  el.innerHTML=`<span class="mode-name ${unc?'low-conf':''}">${detectedKey.mode}${unc?' ?':''}</span> <span class="tonic-note">(${tPC}) ${conf}%</span>`;
}

function updateChromaGrid(){
  const el=document.getElementById('chromaGrid');
  if(pitchClusters.length===0){let h='';for(let i=0;i<12;i++)h+=`<div class="chroma-bar"><div class="chroma-fill"><div class="chroma-fill-inner" style="height:0%"></div></div><div class="chroma-label">${NOTE_NAMES[i]}</div></div>`;el.innerHTML=h;return;}
  const max=Math.max(...pitchClusters.map(c=>c.totalWeight),0.001);
  const cByPC={};const scaleN=new Set();
  if(detectedKey){detectedKey.scaleIntervals.forEach(s=>scaleN.add(((Math.round(detectedKey.tonicMidi)+s)%12+12)%12));}
  for(const c of pitchClusters){const pc=((Math.round(c.center)%12)+12)%12;if(!cByPC[pc]||c.totalWeight>cByPC[pc].totalWeight)cByPC[pc]=c;}
  let h='';
  for(let i=0;i<12;i++){const c=cByPC[i];const pct=c?(c.totalWeight/max)*100:0;const inS=scaleN.has(i);const bg=c?(inS?'background:#5b8def;opacity:0.85':'background:#6e6e7a;opacity:0.5'):'background:#6e6e7a;opacity:0.15';
    h+=`<div class="chroma-bar"><div class="chroma-fill"><div class="chroma-fill-inner" style="height:${pct}%;${bg}"></div></div><div class="chroma-label ${inS?'in-scale':''}">${NOTE_NAMES[i]}</div></div>`;}
  el.innerHTML=h;
}

// Contour
function drawContour(){
  const canvas=document.getElementById('contourCanvas');const dpr=window.devicePixelRatio||1;
  const rect=canvas.getBoundingClientRect();canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  const W=rect.width,H=rect.height,PL=36,PT=8,PB=8,DH=H-PT-PB,DW=W-PL;
  ctx.clearRect(0,0,W,H);if(contourData.length<2)return;
  const now=performance.now(),winMs=10000;
  const recent=contourData.filter(d=>now-d.time<winMs);if(recent.length<2)return;
  const midis=recent.map(d=>d.midi).filter(m=>m>0);if(midis.length===0)return;
  let tMin=Math.min(...midis)-3,tMax=Math.max(...midis)+3;
  if(tMax-tMin<10){const c=(tMax+tMin)/2;tMin=c-5;tMax=c+5;}
  displayMinMidi+=(tMin-displayMinMidi)*0.05;displayMaxMidi+=(tMax-displayMaxMidi)*0.05;
  const minM=displayMinMidi,maxM=displayMaxMidi;
  const toY=m=>PT+DH-((m-minM)/(maxM-minM))*DH;
  const toX=t=>PL+((t-(now-winMs))/winMs)*DW;

  if(detectedKey){
    const si=detectedKey.scaleIntervals;
    ctx.textAlign='right';ctx.textBaseline='middle';ctx.font='500 11px JetBrains Mono';
    for(let oct=-2;oct<=2;oct++){for(let d=0;d<si.length;d++){
      const midi=detectedKey.tonicMidi+si[d]+oct*12;if(midi<minM-1||midi>maxM+1)continue;
      const y=toY(midi);if(y<PT||y>H-PB)continue;
      ctx.strokeStyle=d===0?'#ffffff18':'#ffffff0a';ctx.lineWidth=d===0?1.5:1;
      ctx.setLineDash(d===0?[]:[4,4]);ctx.beginPath();ctx.moveTo(PL,y);ctx.lineTo(W,y);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle=COLORS[d%7]+'aa';ctx.fillText(`${d+1}\u0302`,PL-6,y);
    }}
  }
  ctx.lineWidth=3;ctx.lineJoin='round';ctx.lineCap='round';
  let px=null,py=null;
  for(const d of recent){if(d.midi<=0){px=null;continue;}
    const x=toX(d.time),y=toY(d.midi);
    if(px!==null){const ci=d.degree?((d.degree-1)%7):0;const col=d.degree?COLORS[ci]:'#888';ctx.shadowColor=col;ctx.shadowBlur=6;ctx.strokeStyle=col;ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(x,y);ctx.stroke();ctx.shadowBlur=0;}
    px=x;py=y;
  }
}

// Main loop
function processAudio(){
  if(!isRecording)return;
  analyser.getFloatTimeDomainData(buffer);
  const freq=detectPitch(buffer,audioCtx.sampleRate);const now=performance.now();
  if(freq>0){
    const rawMidi=freqToMidi(freq);const nr=processNoteStability(rawMidi,now);
    if(nr){
      const midi=nr.midi;
      noteObservations.push({midi,isOnset:nr.isNew,time:now});
      keyUpdateCounter++;
      if(nr.isNew||keyUpdateCounter%15===0){
        pitchClusters=clusterPitches();
        const nk=detectMode(pitchClusters);
        if(nk){
          const ch=!detectedKey||Math.abs(nk.tonicMidi-detectedKey.tonicMidi)>0.5||nk.mode!==detectedKey.mode;
          detectedKey=nk;if(ch)reassignDegrees();
        }
        updateModeDisplay();updateHint();
      }
      let di=null;
      if(detectedKey&&pitchClusters.length>=2){
        di=getScaleDegree(midi,detectedKey);
        if(nr.isNew||noteSequence.length===0)addToSequence(midi,di.degree,now);
        contourData.push({time:now,midi,degree:di.degree});
      }else{contourData.push({time:now,midi,degree:null});}
      updateCurrentDegree(midiToFreq(midi),midi,di);inSilence=false;
    }
  }else{
    if(!inSilence){inSilence=true;silenceStart=now;}
    if(now-silenceStart>150){currentNoteMidi=null;pendingMidi=null;lastRawMidi=null;}
    contourData.push({time:now,midi:0,degree:null});
    if(now-silenceStart>300)updateCurrentDegree(0,0,null);
  }
  if(contourData.length>3000)contourData=contourData.slice(-2000);
  updateChromaGrid();drawContour();
  animFrame=requestAnimationFrame(processAudio);
}

// Audio recording
function startRec(s){audioChunks=[];try{mediaRecorder=new MediaRecorder(s,{mimeType:'audio/webm;codecs=opus'});}catch(e){try{mediaRecorder=new MediaRecorder(s);}catch(e2){return;}}
  mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};
  mediaRecorder.onstop=()=>{recordedBlob=new Blob(audioChunks,{type:mediaRecorder.mimeType||'audio/webm'});document.getElementById('downloadBtn').disabled=false;};
  mediaRecorder.start(100);}
function stopRec(){if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();}
async function downloadAudio(){if(!recordedBlob)return;
  try{const ab=await recordedBlob.arrayBuffer();const tc=new OfflineAudioContext(1,1,44100);const dec=await tc.decodeAudioData(ab);
    const wc=new OfflineAudioContext(1,dec.length,dec.sampleRate);const src=wc.createBufferSource();src.buffer=dec;src.connect(wc.destination);src.start();const r=await wc.startRendering();
    const wb=bufToWav(r);const url=URL.createObjectURL(wb);const a=document.createElement('a');a.href=url;a.download=`whistle-${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.wav`;a.click();URL.revokeObjectURL(url);
  }catch(e){const url=URL.createObjectURL(recordedBlob);const a=document.createElement('a');a.href=url;a.download=`whistle-${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.webm`;a.click();URL.revokeObjectURL(url);}}
function bufToWav(buf){const sr=buf.sampleRate,d=buf.getChannelData(0),dl=d.length*2,tl=44+dl;const w=new ArrayBuffer(tl),v=new DataView(w);
  function ws(o,s){for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));}
  ws(0,'RIFF');v.setUint32(4,tl-8,true);ws(8,'WAVE');ws(12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);
  v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);v.setUint16(34,16,true);ws(36,'data');v.setUint32(40,dl,true);
  let o=44;for(let i=0;i<d.length;i++){const s=Math.max(-1,Math.min(1,d[i]));v.setInt16(o,s<0?s*0x8000:s*0x7FFF,true);o+=2;}
  return new Blob([w],{type:'audio/wav'});}

async function toggleRecording(){
  if(isRecording){stopRecording();return;}
  try{audioCtx=new AudioContext();mediaStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
    const source=audioCtx.createMediaStreamSource(mediaStream);analyser=audioCtx.createAnalyser();analyser.fftSize=bufferSize;buffer=new Float32Array(bufferSize);source.connect(analyser);
    startRec(mediaStream);isRecording=true;startTime=performance.now();
    document.getElementById('startBtn').classList.add('recording');document.getElementById('startBtn').innerHTML='<span class="dot"></span> stop listening';
    document.getElementById('downloadBtn').disabled=true;updateHint();processAudio();
  }catch(e){console.error('Mic error:',e);alert('Could not access microphone.');}}

function stopRecording(){isRecording=false;if(animFrame)cancelAnimationFrame(animFrame);stopRec();
  if(mediaStream)mediaStream.getTracks().forEach(t=>t.stop());if(audioCtx)audioCtx.close();
  document.getElementById('startBtn').classList.remove('recording');document.getElementById('startBtn').innerHTML='start listening';updateHint();}

function clearAll(){noteObservations=[];pitchClusters=[];detectedKey=null;noteSequence=[];contourData=[];
  lastSequenceDegree=null;lastSequenceMidi=null;currentNoteMidi=null;pendingMidi=null;lastRawMidi=null;
  inSilence=false;displayMinMidi=60;displayMaxMidi=80;keyUpdateCounter=0;
  recordedBlob=null;audioChunks=[];updateModeDisplay();updateHint();updateCurrentDegree(0,0,null);
  document.getElementById('noteSequence').innerHTML='';document.getElementById('downloadBtn').disabled=true;
  updateChromaGrid();const c=document.getElementById('contourCanvas').getContext('2d');c.clearRect(0,0,c.canvas.width,c.canvas.height);}

updateChromaGrid();
window.addEventListener('resize',()=>{if(contourData.length>0)drawContour();});
</script>
